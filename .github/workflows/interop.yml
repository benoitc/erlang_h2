name: Interop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  h2spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '26'
          rebar3-version: '3.23'
      - name: Install h2spec
        run: |
          curl -sSL -o /tmp/h2spec.tar.gz \
            https://github.com/summerwind/h2spec/releases/download/v2.6.0/h2spec_linux_amd64.tar.gz
          tar -xzf /tmp/h2spec.tar.gz -C /usr/local/bin h2spec
          h2spec --version
      - run: rebar3 ct --suite=test/h2_interop_SUITE
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: interop-logs
          path: _build/test/logs
