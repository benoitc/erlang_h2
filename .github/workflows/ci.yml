name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '26'
          rebar3-version: '3.23'
      - run: rebar3 compile

  xref:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '26'
          rebar3-version: '3.23'
      - run: rebar3 xref

  dialyzer:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '26'
          rebar3-version: '3.23'
      - uses: actions/cache@v4
        with:
          path: _build/default/*_plt
          key: plt-${{ runner.os }}-otp26-${{ hashFiles('rebar.config') }}
          restore-keys: plt-${{ runner.os }}-otp26-
      - run: rebar3 dialyzer

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '26'
          rebar3-version: '3.23'
      - run: rebar3 eunit
      - run: rebar3 ct --suite=test/h2_compliance_SUITE
      - run: rebar3 cover
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ct-logs
          path: _build/test/logs
